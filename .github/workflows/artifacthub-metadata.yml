name: publish-artifacthub-metadata

on:
  push:
    branches: [main]
    paths:
      - artifacthub-repo.yml
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish-metadata:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup ORAS
        uses: oras-project/setup-oras@v1

      - name: Login to GHCR
        env:
          CR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: echo "$CR_TOKEN" | oras login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Push Artifact Hub metadata tag
        run: |
          oras push ghcr.io/${{ github.repository_owner }}/charts/aegis:artifacthub.io \
            --config /dev/null:application/vnd.cncf.artifacthub.config.v1+yaml \
            artifacthub-repo.yml:application/vnd.cncf.artifacthub.repository-metadata.layer.v1.yaml
