name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  helm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.15.4

      - name: Lint chart
        run: helm lint charts/aegis

      - name: Template chart
        run: helm template aegis charts/aegis --namespace aegis-system > /tmp/aegis-render.yaml

      - name: Validate package
        run: |
          mkdir -p dist
          helm package charts/aegis --destination dist
          ls -la dist
