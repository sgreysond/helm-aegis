name: publish-chart

on:
  push:
    tags:
      - 'chart-aegis-v*'

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.15.4

      - name: Lint chart
        run: helm lint charts/aegis

      - name: Helm registry login
        env:
          CR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: echo "$CR_TOKEN" | helm registry login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Package and push
        run: |
          mkdir -p dist
          helm package charts/aegis --destination dist
          FILE=$(ls dist/aegis-*.tgz | head -n1)
          helm push "$FILE" oci://ghcr.io/${{ github.repository_owner }}/charts

      - name: Output hint
        run: |
          FILE=$(ls dist/aegis-*.tgz | head -n1)
          VER=$(echo "$FILE" | sed -E 's/.*aegis-([0-9.]+)\.tgz/\1/')
          echo "Install: helm upgrade --install aegis oci://ghcr.io/${{ github.repository_owner }}/charts/aegis --version ${VER}"
