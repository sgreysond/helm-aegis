{{- if and .Values.controlPlane.enabled .Values.controlPlane.tls.enabled .Values.controlPlane.tls.certManager.enabled }}
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ include "aegis.fullname" . }}-cp
  labels:
    app.kubernetes.io/name: {{ include "aegis.name" . }}
    app.kubernetes.io/component: control-plane
spec:
  secretName: {{ include "aegis.controlPlaneTlsSecretName" . }}
  issuerRef:
    name: {{ .Values.controlPlane.tls.certManager.issuerRef.name | quote }}
    kind: {{ .Values.controlPlane.tls.certManager.issuerRef.kind | default "ClusterIssuer" | quote }}
    group: {{ .Values.controlPlane.tls.certManager.issuerRef.group | default "cert-manager.io" | quote }}
  dnsNames:
    {{- $svc := printf "%s-cp" (include "aegis.fullname" .) -}}
    - {{ $svc | quote }}
    - {{ printf "%s.%s.svc" $svc .Release.Namespace | quote }}
    - {{ printf "%s.%s.svc.cluster.local" $svc .Release.Namespace | quote }}
    {{- range .Values.controlPlane.tls.certManager.dnsNames }}
    - {{ . | quote }}
    {{- end }}
{{- end }}

