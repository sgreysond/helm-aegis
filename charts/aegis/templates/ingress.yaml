{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "aegis.fullname" . }}
  annotations:
{{- range $k, $v := .Values.ingress.annotations }}
    {{$k}}: "{{$v}}"
{{- end }}
spec:
  ingressClassName: {{ .Values.ingress.className | default "" | quote }}
  rules:
{{- range .Values.ingress.hosts }}
    - host: {{ . | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "aegis.fullname" $ }}-cp
                port:
                  number: {{ $.Values.controlPlane.service.port }}
{{- end }}
  {{- if .Values.ingress.tls.enabled }}
  tls:
    - hosts: {{ .Values.ingress.hosts | toYaml | nindent 6 }}
      secretName: {{ .Values.ingress.tls.secretName | quote }}
  {{- end }}
{{- end }}

