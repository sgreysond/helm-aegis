{{- if .Values.rbac.create }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "aegis.fullname" . }}
  labels:
    app.kubernetes.io/name: {{ include "aegis.name" . }}
rules:
  - apiGroups: [""]
    resources:
      - pods
      - namespaces
      - nodes
      - endpoints
    verbs:
      - get
      - list
      - watch
{{- end }}

